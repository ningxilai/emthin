# cargo-release configuration
# Run: cargo release <patch|minor|major|X.Y.Z> --execute
# See https://github.com/crate-ci/cargo-release for reference.

publish = false
push = true
tag-prefix = ""
tag-name = "v{{version}}"
pre-release-commit-message = "chore: release {{version}}"
consolidate-commits = true
# Must be the string "workspace", not bool `true`. Any crate whose
# version is `version.workspace = true` gets automatically placed in
# the group `"workspace"` by cargo-release (see config.rs:1038). Our
# `emthin` crate uses a literal version (cargo-aur 0.x limitation),
# so we need to put it in the same group explicitly — otherwise
# `find_shared_versions` sees two groups, returns None, and
# `{{version}}` in the consolidated commit message renders as an
# empty/unrendered template.
shared-version = "workspace"

# cargo-release already bumps [workspace.package].version AND every
# [package].version literal on its own (confirmed by the dry-run output:
# "Upgrading workspace to version X.Y.Z" + "Upgrading <crate> from ..."),
# so no pre-release-replacements are needed here.
#
# The pre-release-hook for git-cliff lives in
# crates/emthin/Cargo.toml's [package.metadata.release] instead of here,
# because cargo-release runs hooks with the package root as CWD. Scoping
# it to the emthin crate gives git-cliff a predictable relative path
# (`../../CHANGELOG.md`) and ensures the hook fires exactly once per
# release, not once per workspace member.
