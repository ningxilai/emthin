zvariant = { version = "5", default-features = false }
serde = { workspace = true }
# Used by `proxy::cmsg` for `recvmsg`/`sendmsg` + SCM_RIGHTS.
libc = "0.2"

[dev-dependencies]
tempfile = "3"
